name: 'CIRecon'
description: 'Agentic CI/CD workflow repair — detects and auto-fixes GitHub Actions errors'
author: 'arpita-rathwa'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  anthropic-api-key:
    description: 'Anthropic API key for LLM-based fix fallback'
    required: false
  max-iterations:
    description: 'Maximum agent loop iterations'
    required: false
    default: '10'
  fail-on-unresolved:
    description: 'Exit with error if issues remain after repair'
    required: false
    default: 'false'
  mode:
    description: 'Run mode: scan (default) or dashboard'
    required: false
    default: 'scan'
  repos:
    description: 'Comma-separated list of repos for dashboard mode'
    required: false
    default: ''
  gist-id:
    description: 'Optional existing Gist ID to update (dashboard mode)'
    required: false
    default: ''
  claude-model:
    description: 'Claude model to use for LLM fallback'
    required: false
    default: 'claude-haiku-4-5-20251001'
  github-token:
    description: 'GitHub token — required for dashboard mode to clone repos'
    required: false
    default: ''

runs:
  using: 'docker'
  image: 'Dockerfile'
  env:
    ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
    MAX_ITERATIONS: ${{ inputs.max-iterations }}
    FAIL_ON_UNRESOLVED: ${{ inputs.fail-on-unresolved }}
    MODE: ${{ inputs.mode }}
    REPOS: ${{ inputs.repos }}
    GIST_ID: ${{ inputs.gist-id }}
    CLAUDE_MODEL: ${{ inputs.claude-model }}
    GITHUB_TOKEN: ${{ inputs.github-token }}
